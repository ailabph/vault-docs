services:
  backend:
    build: ./backend
    # Port 8000 is internal only — not exposed to the host.
    # Frontend (Nginx) proxies /api/* to backend:8000 internally.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:35b}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - MAX_WORDS_PROMPT=${MAX_WORDS_PROMPT:-8000}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
